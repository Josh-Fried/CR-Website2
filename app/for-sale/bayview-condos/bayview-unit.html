    <style>
      /* --- Split Layout CSS --- */
      .hero-split-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        max-width: 1400px;
        margin: 0 auto;
        padding: 6rem 20px 4rem 20px;
        gap: 50px;
      }

      .hero-left-stats {
        flex: 1;
        min-width: 350px;
        max-width: 500px;
      }

      .hero-right-view {
        flex: 1.5;
        min-width: 350px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin: 30px 0;
      }

      .stat-box {
        background: #f7f9fa;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #eaeaea;
      }

      .stat-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
      .stat-value { font-size: 1.4rem; font-weight: bold; color: #333; margin-top: 5px;}
      .status-available { color: #1e8e3e; }

      .info-text { font-size: 1.1rem; line-height: 1.6; color: #444; margin-bottom: 30px; }

      /* --- Carousel Base Container --- */
      #hero-view-container {
        position: relative;
        width: 100%;
        height: 400px; 
      }

      #hero-carousel {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #hero-carousel .slick-list,
      #hero-carousel .slick-track,
      #hero-carousel .slick-slide,
      #hero-carousel .slick-slide > div {
        height: 100% !important;
      }

      #hero-carousel img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      #hero-carousel.slick-dotted.slick-slider {
        margin-bottom: 0;
      }

      #hero-view-container .slide-count {
        position: absolute;
        top: 15px;
        right: 15px;
        background-color: rgba(0, 0, 0, 0.6);
        color: #fff;
        padding: 4px 12px;
        border-radius: 15px;
        font-size: 14px;
        z-index: 10;
        font-weight: 500;
      }

      #hero-view-container .slick-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        background: transparent; 
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 24px;
        cursor: pointer;
        opacity: 0; 
        transition: opacity 0.3s ease;
        box-shadow: none !important;
        color: white;
        text-shadow:
          -1px -1px 0 #333,
          1px -1px 0 #333,
          -1px 1px 0 #333,
          1px 1px 0 #333;
      }

      #hero-view-container .slick-prev-arrow { left: 15px; }
      #hero-view-container .slick-next-arrow { right: 15px; }

      #hero-view-container:hover .slick-arrow { opacity: 1; }
      #hero-view-container .slick-arrow:hover { color: #ccc; }

      #hero-view-container .slick-dots {
        bottom: 15px;
        position: absolute;
      }

      #hero-view-container .slick-dots li button:before {
        font-size: 12px;
        color: #fff;
        opacity: 0.75;
      }

      #hero-view-container .slick-dots li.slick-active button:before {
        color: #fff;
        opacity: 1;
      }

      #hero-view-container .slick-dots li button {
        box-shadow: none !important;
        outline: none !important;
      }

      /* --- Image Gallery Section CSS --- */
      .image-gallery-section {
        max-width: 1400px;
        margin: 0 auto 4rem auto;
        padding: 0 20px;
      }

      .image-gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
      }

      .image-gallery-grid img {
        width: 100%;
        height: 350px;
        object-fit: cover;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      }
      
      /* --- Floor Plan Layout CSS --- */
      .layout-grid {
        display: flex; 
        gap: 30px; 
        justify-content: center; 
        flex-wrap: wrap; 
        margin-top: 40px;
      }
      .layout-grid img {
        width: 45%; 
        min-width: 320px; 
        border: 1px solid #eaeaea; 
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      }

      @media (max-width: 900px) {
        .hero-split-container { 
          flex-direction: column-reverse; 
          padding-top: 4rem; 
          align-items: center; 
        }
        .hero-left-stats { max-width: 100%; text-align: center; }
        .stats-grid { text-align: left; }

        #hero-view-container {
          height: 300px !important;
          width: 100%;
          max-width: 600px;
        }
      }
    </style>

    <script>
      $(document).ready(async function() {
        console.log("1. Script started.");
        
        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        console.log("2. Path segments:", pathSegments);

        const building = pathSegments[pathSegments.length - 2]; 
        const room = pathSegments[pathSegments.length - 1];
        const unitId = `${building}${room}`.toUpperCase(); 
        console.log("3. Target Unit ID:", unitId);

        if (unitId) {
          try {
            console.log("4. Attempting to fetch units.json...");
            const response = await fetch('/for-sale/bayview-condos/bayview-units.json');
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const units = await response.json();
            console.log("5. Successfully loaded JSON data.");

            const unitData = units[unitId];

            if (unitData) {
              console.log("6. Found matching unit data:", unitData);
              document.getElementById('page-title').innerText = `Bayview Unit ${unitId} - Papagayo Bay`;
              document.getElementById('unit-title').innerText = unitData.title;
              document.getElementById('unit-price').innerText = unitData.price;
              document.getElementById('unit-beds-baths').innerText = `${unitData.beds} / ${unitData.baths}`;
              document.getElementById('unit-sqft').innerText = `${unitData.sqft} sq ft`;
              document.getElementById('unit-description').innerText = unitData.description;
              document.getElementById('layout-subtitle').innerText = `Explore the architectural flow and spatial design of Unit ${unitId}.`;
              document.getElementById('layout-image').src = unitData.layoutImage;

              // Build the carousel dynamically
              const $carousel = $('#hero-carousel');
              
              // Checks if you added a carouselImages array to the JSON, otherwise uses fallbacks to keep it working
              const imagesToLoad = [
                  "/images/A1_101_V1.jpeg",
                  "/images/A1_101_V2.jpeg", 
                  "/images/Bay1.webp"       
              ];

              // Inject the image tags into the DOM
              imagesToLoad.forEach(imgSrc => {
                  $carousel.append(`<img src="${imgSrc}" alt="View of ${unitId}">`);
              });

              // Initialize Slick only after images are successfully appended
              var $heroView = $('#hero-view-container');
              var $slideCount = $heroView.find('.slide-count');

              var updateCount = function(event, slick, currentSlide) {
                  var i = (currentSlide ? currentSlide : 0) + 1;
                  $slideCount.text(i + ' / ' + slick.slideCount);
              };

              $carousel.on('init reInit afterChange', updateCount);

              $carousel.slick({
                  dots: true,
                  arrows: true,
                  prevArrow: '<button type="button" class="slick-prev-arrow">&#10094;</button>',
                  nextArrow: '<button type="button" class="slick-next-arrow">&#10095;</button>',
                  infinite: true,
                  speed: 500,
                  fade: true,
                  cssEase: 'linear',
                  autoplay: false, 
                  autoplaySpeed: 2000,
                  slidesToShow: 1,
                  slidesToScroll: 1
              });

              $heroView.data('autoplay-enabled', true);

              $heroView.hover(function() {
                  if ($(this).data('autoplay-enabled')) {
                      $carousel.slick('slickPlay');
                  }
              }, function() {
                  $carousel.slick('slickPause');
                  $(this).data('autoplay-enabled', true);
              });

              $carousel.find('.slick-arrow, .slick-dots button').on('click', function() {
                  $heroView.data('autoplay-enabled', false);
                  $carousel.slick('slickPause');
              });

              console.log("7. DOM and Carousel successfully updated.");
            } else {
              console.error(`ERROR: Unit ID '${unitId}' not found in the JSON file.`);
            }
          } catch (error) {
            console.error("ERROR loading or parsing data:", error);
          }
        } else {
            console.error("ERROR: Could not build a Unit ID from the URL.");
        }
      });
    </script>
