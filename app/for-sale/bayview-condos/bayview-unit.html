    />
    <link rel="stylesheet" href="/assets/css/WPengineCSS.css" />

    <script type="text/javascript">
      document.documentElement.classList.add("js");
    </script>

    <style>
      .hero-split-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        max-width: 1400px;
        margin: 0 auto;
        padding: 6rem 20px 4rem 20px;
        gap: 50px;
      }

      .hero-left-stats {
        flex: 1;
        min-width: 350px;
        max-width: 500px;
      }

      .hero-right-view {
        flex: 1.5;
        min-width: 350px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      }

      .hero-right-view video,
        .hero-right-view img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin: 30px 0;
      }

      .stat-box {
        background: #f7f9fa;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #eaeaea;
      }

      .stat-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
      .stat-value { font-size: 1.4rem; font-weight: bold; color: #333; margin-top: 5px;}
      .status-available { color: #1e8e3e; }

      .info-text { font-size: 1.1rem; line-height: 1.6; color: #444; margin-bottom: 30px; }
      
      .image-gallery-section {
        max-width: 1400px;
        margin: 0 auto 4rem auto;
        padding: 0 20px;
      }

      .image-gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
      }

      .image-gallery-grid img {
        width: 100%;
        height: 350px;
        object-fit: cover;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      }
      
      .layout-grid {
        display: flex; 
        gap: 30px; 
        justify-content: center; 
        flex-wrap: wrap; 
        margin-top: 40px;
      }
      .layout-grid img {
        width: 45%; 
        min-width: 320px; 
        border: 1px solid #eaeaea; 
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      }

      @media (max-width: 900px) {
        .hero-split-container { flex-direction: column-reverse; padding-top: 4rem; }
        .hero-left-stats { max-width: 100%; text-align: center; }
        .stats-grid { text-align: left; }
      }
    </style>

  </head>

  <body
    class="material"
    data-header-format="centered-logo-between-menu-alt"
    data-header-resize="1"
    data-transparent-header="false"
    data-header-color=""
    data-remove-border="true"
    data-smooth-scrolling="0"
    data-cad="1500"
    data-cae="easeOutQuart"
    data-aie="none"
    data-ls="fancybox"
    onLoad="lm_InitWebForm()"
  >
    <div id="ajax-content-wrap">
      <div class="container-wrap">
        <div id="wrapper">
          <div id="main">
            
            <section id="hero-split" class="fade-in-up">
              <div class="hero-split-container">
                
                <div class="hero-left-stats">
                  <h1 id="unit-title" style="font-size: 3.5rem; margin-top: 1rem; margin-bottom: 5px; line-height: 1.1;"></h1>
                  <p style="color: #666; font-size: 1.2rem; margin-bottom: 0;">The Bayview Collection at Triada</p>
                  
                  <div class="stats-grid">
                    <div class="stat-box">
                      <div class="stat-label">Price</div>
                      <div id="unit-price" class="stat-value"></div>
                    </div>
                    <div class="stat-box">
                      <div class="stat-label">Bed / Bath</div>
                      <div id="unit-beds-baths" class="stat-value"></div>
                    </div>
                    <div class="stat-box">
                      <div class="stat-label">Floors</div>
                      <div class="stat-value">1</div>
                    </div>
                    <div class="stat-box">
                      <div class="stat-label">Build Area</div>
                      <div id="unit-sqft" class="stat-value"></div>
                    </div>
                  </div>

                  <div id="unit-description" class="info-text"></div>

                  <a href="#" class="details-button inquire-button" style="padding: 15px 40px; font-size: 1.1rem; display: inline-block;">Inquire</a>
                </div>

                <div class="hero-right-view">
                  <img id="hero-image" src="" alt="View from Bayview Condo">
                </div>

              </div>
            </section>

            <section id="layout-images" class="fade-in-up" style="padding: 1rem 20px; max-width: 1400px; margin: 0 auto; text-align: center; border-top: 1px solid #eaeaea;">
              <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Floor Plans & Layout</h2>
              <p id="layout-subtitle" style="color: #666; margin: 0 auto; text-align: center;"></p>
              
              <div class="layout-grid">
                 <img src="/images/Bayviewtemplayout.png" alt="Main Level Floor Plan" />
                 <img id="layout-image" src="" alt="Unit View">
              </div>
            </section>

            <div id="contact-placeholder"></div>
          </div>
        </div>
      </div>
    </div>
    
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        const building = pathSegments[pathSegments.length - 2]; 
        const room = pathSegments[pathSegments.length - 1];
        const unitId = `${building}${room}`; 

        if (unitId) {
          try {
            const response = await fetch('/bayview-units.json');
            const units = await response.json();
            const unitData = units[unitId];

            if (unitData) {
              document.getElementById('page-title').innerText = `Bayview Unit ${unitId} - Papagayo Bay`;
              document.getElementById('unit-title').innerText = unitData.title;
              document.getElementById('unit-price').innerText = unitData.price;
              document.getElementById('unit-beds-baths').innerText = `${unitData.beds} / ${unitData.baths}`;
              document.getElementById('unit-sqft').innerText = `${unitData.sqft} sq ft`;
              document.getElementById('unit-description').innerText = unitData.description;
              document.getElementById('layout-subtitle').innerText = `Explore the architectural flow and spatial design of Unit ${unitId}.`;
              document.getElementById('hero-image').src = unitData.heroImage;
              document.getElementById('layout-image').src = unitData.layoutImage;
            }
          } catch (error) {
            console.error("Error loading unit data", error);
          }
        }
      });
    </script>

    <script type="text/javascript" src="/assets/js/alexCarousel.js"></script>
    <script src="/assets/js/loadContact.js"></script>

    <script src="/Triada Styling/transit.min.js"></script>

    <script src="/Triada Styling/init.js"></script>

    <script src="/assets/js/nav-bar.js"></script>
